name: CI

on:
  push:
  pull_request:

# A second push to the same branch makes the first one's result irrelevant.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The project ships Windows .bat, macOS .command and Linux .sh launchers and
  # supports 3.10+, but CI only ever ran 3.12 on Linux. The legs below are an
  # explicit include rather than a 3x3 product: the combinations that are not
  # listed add cost without covering anything the listed ones miss.
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # one red leg must not hide the state of the others
      matrix:
        include:
          - {os: ubuntu-latest, python: "3.10"}   # the documented floor
          - {os: ubuntu-latest, python: "3.12"}   # what the Docker image runs
          - {os: ubuntu-latest, python: "3.14"}   # what development runs
          - {os: windows-latest, python: "3.12"}  # os.chmod is a no-op, paths differ
          - {os: windows-latest, python: "3.14"}
          - {os: macos-latest, python: "3.12"}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-test.txt
      - name: Run tests
        run: python -m pytest -q

  quality:
    name: lint and types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-test.txt
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      # All of app/ at the default level. The next ratchet is strictness
      # (disallow_untyped_defs), scoped per-module in pyproject.toml.
      - name: Types
        run: mypy app/
      - name: Coverage
        run: |
          coverage run -m pytest -q
          coverage report --fail-under=72

  # Catch a broken PyInstaller spec / frozen-path regression on every PR, before
  # a release tag depends on it. One cheap Linux build + offline smoke; the full
  # OS matrix runs in release.yml on a tag.
  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies and PyInstaller
        run: pip install -r requirements-dev.txt
      # Its own process: the example plugin registers into the shared provider
      # registries, which is why testpaths keeps it out of the main suite.
      - name: Validate the plugin template
        run: python -m pytest packaging/plugin-template -q
        env:
          PYTHONPATH: .:packaging/plugin-template
      - name: Build the binary
        run: pyinstaller packaging/corparius.spec --noconfirm
      - name: Smoke test (offline mock console)
        run: |
          set -euo pipefail
          ./dist/corparius --no-browser &
          pid=$!
          ok=""
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8600/api/companies >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          if [ "${ok:-}" != "1" ]; then echo "console did not come up"; kill "$pid" 2>/dev/null || true; exit 1; fi
          curl -fsS http://127.0.0.1:8600/api/companies | grep -q '"example"'
          curl -fsS http://127.0.0.1:8600/api/doctor    | grep -q 'mock'
          curl -fsS http://127.0.0.1:8600/api/update    | grep -q '"enabled": false'
          echo "smoke OK: console up, example seeded, mock mode, update-check off by default"
          kill "$pid" 2>/dev/null || true
