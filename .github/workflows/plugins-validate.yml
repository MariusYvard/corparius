# Validate the curated plugin registry on any PR that changes it: each entry must
# download at its pinned ref, match its SHA-256, and load against the current
# plugin API. This is what makes "propose a plugin via a PR" safe and automatic.
name: Validate plugins

on:
  pull_request:
    paths:
      - "plugins/registry.json"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Validate registry.json
        env:
          CORP_HOME: ${{ runner.temp }}/corp-home
          CORP_PLUGINS_ENABLED: "true"
        run: python packaging/validate_registry.py
