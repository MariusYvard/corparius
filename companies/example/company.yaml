# A sample autonomous micro-company. Copy this file to start your own.
slug: example
name: CVBoost
one_liner: >
  An AI resume optimiser that rewrites a CV to match a target job description
  and scores it against applicant tracking systems.

offer:
  product: Self-serve web app, pay per optimised CV plus a monthly subscription.
  price_eur: 9
  billing: stripe

# Ideal customer profile. Agents use this to target outreach and content.
icp:
  segment: Job seekers switching industries, and career coaches
  channels: [linkedin, x, reddit]
  pains:
    - CV rejected by ATS filters before a human reads it
    - No feedback on why an application failed

# Which agents are active for this company. Cadence is defined in code; this
# just toggles roles on or off.
agents:
  ceo: true
  social: true
  outreach: true
  support: true
  ads: false        # off until there is budget to spend
  finance: true
  strategy: true
  competitor: true
  coder: false      # on demand only

# Safety budgets for this company (override the global .env defaults).
budgets:
  session_tokens: 80000
  tokens_per_minute: 8000
  daily_ad_spend_eur: 0

# Tools that always require human approval before executing.
hitl_tools:
  - send_financial_transaction
  - publish_production_code
